[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["pdfkit", "xlsx"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# Borne RFID plein écran (Phase 6) — sert le SPA depuis /borne pour que
# le routing client puisse détecter pathname === '/borne' et basculer
# en mode borne. Le station_token transite en query string.
[[redirects]]
  from = "/borne"
  to = "/index.html"
  status = 200

# /admin → SPA + détection ADMIN_MODE côté client qui affiche directement
# le formulaire login admin (au lieu de la grille publique punch). Permet
# un raccourci direct pour l'admin (URL /admin) sans passer par le link
# "Administration" en bas de la grille.
[[redirects]]
  from = "/admin"
  to = "/index.html"
  status = 200
